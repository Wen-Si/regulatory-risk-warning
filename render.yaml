services:
  - type: web
    name: regulatory-risk-warning
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ZHIPU_API_KEY
        sync: false  # 请在Render Dashboard中手动配置API Key
    healthCheckPath: /api/health
